<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" data-scenario="room-exit">
<style>
  text{font-family:Arial,Helvetica,sans-serif}
  .bg{fill:#0b1533}
  .grid{stroke:rgba(191,219,254,.12);stroke-width:1}
  .card{fill:#111f46;stroke:rgba(191,219,254,.25);stroke-width:2}
  .label{fill:#bfdbfe;font-size:20px;font-weight:900;letter-spacing:2px}
  .title{fill:white;font-size:34px;font-weight:900;letter-spacing:1px}
  .sub{fill:#dbeafe;font-size:22px;font-weight:700}
  .chip{opacity:.18;stroke-width:2}
  .chiptext{font-size:20px;font-weight:900}
  .wave{fill:none;stroke-width:9;stroke-linecap:round;filter:url(#glow)}
  .wave2{fill:none;stroke:#38bdf8;stroke-width:4;stroke-linecap:round;stroke-dasharray:12 16;opacity:.55}
  .room{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.16);stroke-width:2}
  .furniture{fill:rgba(255,255,255,.12);stroke:rgba(255,255,255,.2);stroke-width:2}
  .path{fill:none;stroke:#93c5fd;stroke-width:5;stroke-linecap:round;stroke-dasharray:8 12;opacity:.55}
  .pose path{fill:none;stroke:#fff;stroke-width:15;stroke-linecap:round;stroke-linejoin:round;filter:url(#whiteGlow)}
  .pose circle{fill:#60a5fa;stroke:white;stroke-width:5}
  .read{fill:#172554;stroke:rgba(255,255,255,.22);stroke-width:1}
  .readlabel{fill:#bfdbfe;font-size:16px;font-weight:900;letter-spacing:1px}
  .readvalue{fill:white;font-size:23px;font-weight:900}
</style>
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="whiteGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <radialGradient id="spot" cx="50%" cy="48%" r="58%"><stop stop-color="#f97316" stop-opacity=".22"/><stop offset="1" stop-color="#0b1533" stop-opacity="0"/></radialGradient>
</defs>
<rect class="bg" width="960" height="600" rx="34"/>
<rect x="26" y="24" width="908" height="552" rx="28" fill="url(#spot)"/>
<g opacity=".85">
  <path class="grid" d="M80 42 V558"/><path class="grid" d="M160 42 V558"/><path class="grid" d="M240 42 V558"/><path class="grid" d="M320 42 V558"/><path class="grid" d="M400 42 V558"/><path class="grid" d="M480 42 V558"/><path class="grid" d="M560 42 V558"/><path class="grid" d="M640 42 V558"/><path class="grid" d="M720 42 V558"/><path class="grid" d="M800 42 V558"/><path class="grid" d="M880 42 V558"/>
  <path class="grid" d="M46 100 H914"/><path class="grid" d="M46 170 H914"/><path class="grid" d="M46 240 H914"/><path class="grid" d="M46 310 H914"/><path class="grid" d="M46 380 H914"/><path class="grid" d="M46 450 H914"/><path class="grid" d="M46 520 H914"/>
</g>
<rect class="card" x="46" y="42" width="868" height="516" rx="28"/>
<rect class="room" x="328" y="188" width="520" height="206" rx="26"/>
<text class="label" x="78" y="88">RUVIEW + SAFEWAVE EXAMPLE</text>
<text class="title" x="78" y="140">EXIT NO RETURN</text>
<text class="sub" x="78" y="178">No return after room exit</text>
<rect class="chip" x="708" y="70" width="166" height="54" rx="27" fill="#f97316" stroke="#f97316"/>
<text class="chiptext" x="736" y="105" fill="#f97316">HIGH - 84</text>
<path class="wave2" d="M120 350 C240 304 332 316 455 276 C590 230 700 248 842 210"/>
<path class="wave" d="M96 300 C170 244 250 250 330 204 C438 142 538 178 630 138 C710 102 760 124 814 108" stroke="#f97316"/>
<rect class="furniture" x="350" y="314" width="170" height="52" rx="24"/><path class="path" d="M430 292 C500 238 580 232 676 188"/><g class="pose"><circle cx="666" cy="176" r="18"/><path d="M666 196 L650 270"/><path d="M658 218 L610 238"/><path d="M658 218 L706 236"/><path d="M650 270 L606 340"/><path d="M650 270 L718 326"/><circle cx="610" cy="238" r="9"/><circle cx="706" cy="236" r="9"/><circle cx="606" cy="340" r="9"/><circle cx="718" cy="326" r="9"/></g><rect class="room" x="730" y="138" width="86" height="210" rx="18"/><path d="M742 154 V332" stroke="rgba(255,255,255,.42)" stroke-width="6" stroke-linecap="round"/>
<g transform="translate(78 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">CSI STATE</text><text class="readvalue" x="18" y="56">NO RETURN</text>
</g>
<g transform="translate(286 462)">
  <rect class="read" width="150" height="70" rx="18"/><text class="readlabel" x="18" y="27">RISK</text><text class="readvalue" x="18" y="56">HIGH</text>
</g>
<g transform="translate(454 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">ACTION</text><text class="readvalue" x="18" y="56">CARE CHECK</text>
</g>
<g transform="translate(662 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">PRIVACY</text><text class="readvalue" x="18" y="56">NO CAMERA</text>
</g>
</svg>
