<path class="wave" d="M96 286 C220 280 320 290 430 282 C550 274 670 280 814 274" stroke="#38bdf8"/>
<rect class="furniture" x="365" y="310" width="250" height="52" rx="26"/><g class="pose"><circle cx="394" cy="284" r="17"/><path d="M414 292 L536 320"/><path d="M452 300 L420 340"/><path d="M476 306 L508 348"/><path d="M536 320 L600 320"/><path d="M536 320 L594 352"/><circle cx="420" cy="340" r="8"/><circle cx="508" cy="348" r="8"/><circle cx="600" cy="320" r="8"/><circle cx="594" cy="352" r="8"/></g>
<g transform="translate(78 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">CSI STATE</text><text class="readvalue" x="18" y="56">REST</text>
</g>
<g transform="translate(286 462)">
  <rect class="read" width="150" height="70" rx="18"/><text class="readlabel" x="18" y="27">RISK</text><text class="readvalue" x="18" y="56">LOW</text>
</g>
<g transform="translate(454 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">ACTION</text><text class="readvalue" x="18" y="56">MONITOR</text>
</g>
<g transform="translate(662 462)">
  <rect class="read" width="190" height="70" rx="18"/><text class="readlabel" x="18" y="27">PRIVACY</text><text class="readvalue" x="18" y="56">NO CAMERA</text>
</g>
</svg>
