<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" data-scenario="faint">
<style>
  text{font-family:Arial,Helvetica,sans-serif}
  .bg{fill:#0b1533}
  .grid{stroke:rgba(191,219,254,.12);stroke-width:1}
  .card{fill:#111f46;stroke:rgba(191,219,254,.25);stroke-width:2}
  .label{fill:#bfdbfe;font-size:20px;font-weight:900;letter-spacing:2px}
  .title{fill:white;font-size:34px;font-weight:900;letter-spacing:1px}
  .sub{fill:#dbeafe;font-size:22px;font-weight:700}
  .chip{opacity:.18;stroke-width:2}
  .chiptext{font-size:20px;font-weight:900}
  .wave{fill:none;stroke-width:9;stroke-linecap:round;filter:url(#glow)}
  .wave2{fill:none;stroke:#38bdf8;stroke-width:4;stroke-linecap:round;stroke-dasharray:12 16;opacity:.55}
  .room{fill:rgba(255,255,255,.035);stroke:rgba(255,255,255,.16);stroke-width:2}
  .furniture{fill:rgba(255,255,255,.12);stroke:rgba(255,255,255,.2);stroke-width:2}
  .path{fill:none;stroke:#93c5fd;stroke-width:5;stroke-linecap:round;stroke-dasharray:8 12;opacity:.55}
  .pose path{fill:none;stroke:#fff;stroke-width:15;stroke-linecap:round;stroke-linejoin:round;filter:url(#whiteGlow)}
  .pose circle{fill:#60a5fa;stroke:white;stroke-width:5}
  .read{fill:#172554;stroke:rgba(255,255,255,.22);stroke-width:1}
  .readlabel{fill:#bfdbfe;font-size:16px;font-weight:900;letter-spacing:1px}
  .readvalue{fill:white;font-size:23px;font-weight:900}
</style>
<defs>
